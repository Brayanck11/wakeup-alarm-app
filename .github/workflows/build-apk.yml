name: Build APK - WAKE UP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Generar package-lock.json
        run: npm install --package-lock-only

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Configurar pantalla completa e inmersiva
        run: |
          # Agregar modo inmersivo a MainActivity
          MAIN_ACTIVITY="android/app/src/main/java/com/wakeup/alarm/MainActivity.java"
          if [ -f "$MAIN_ACTIVITY" ]; then
            cat > "$MAIN_ACTIVITY" << 'JAVA'
package com.wakeup.alarm;

import android.os.Bundle;
import android.view.View;
import android.view.WindowManager;
import com.getcapacitor.BridgeActivity;

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        // Pantalla completa inmersiva
        getWindow().getDecorView().setSystemUiVisibility(
            View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
            | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
            | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
            | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
            | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
            | View.SYSTEM_UI_FLAG_FULLSCREEN
        );
        // Mantener pantalla encendida
        getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
    }
}
JAVA
            echo "MainActivity actualizado con modo inmersivo"
          fi

      - name: Permisos Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: WAKEUP-v6-mejorado
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Info del APK
        run: |
          echo "✅ APK v6 mejorado generado"
          ls -lh android/app/build/outputs/apk/debug/
